name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Sync (dev + collector + deep)
        run: uv sync --group dev --extra collector --extra deep
      - name: Lint
        run: uv run ruff check .
      - name: Format check
        run: uv run ruff format --check .
      - name: Type check
        run: uv run mypy src/
      - name: Tests (unit)
        run: uv run pytest -q -m "not integration"
      - name: Build package
        run: uv build

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # npm ci is strict about platform-specific optional deps in the lockfile;
      # fall back to npm install (as the Docker build does) if they drift.
      - run: npm ci || npm install
      - run: npm run build
