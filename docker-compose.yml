# Always-on DaskGenie: collector (API + metrics + SQLite) and the Next.js
# dashboard. Point your jobs' collector_url at http://localhost:8765 and open
# the dashboard at http://localhost:3000.
#
#   docker compose up -d --build
services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      - POSTGRES_USER=daskgenie
      - POSTGRES_PASSWORD=daskgenie
      - POSTGRES_DB=daskgenie
    volumes:
      - daskgenie-tsdb:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U daskgenie"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  collector:
    build: .
    environment:
      - DASKGENIE_HOST=0.0.0.0
      - DASKGENIE_DSN=postgresql://daskgenie:daskgenie@timescaledb:5432/daskgenie
    ports:
      - "8765:8765"
    volumes:
      - daskgenie-data:/data
    depends_on:
      timescaledb:
        condition: service_healthy
    restart: unless-stopped

  web:
    build: ./web
    environment:
      - COLLECTOR_URL=http://collector:8765
    ports:
      - "3000:3000"
    depends_on:
      - collector
    restart: unless-stopped

volumes:
  daskgenie-data:
  daskgenie-tsdb:
